/* ── AFFILIÉS ── */
.aff-box{display:none;margin-top:16px;background:#fffbeb;

/* ── JOURNEY ── */

/* ── SHARE BAR ── */
.share-bar{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.s-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;

       cursor:pointer;transition:all .2s}
.s-btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.s-reddit{background:#ff4500;color:#fff}
.s-twitter{background:#000;color:#fff}

/* ── AD SLOT ── */
.ad-slot{background:#fff;border-radius:10px;padding:14px;text-align:center;
         border:1px dashed #cbd5e0;margin-bottom:20px;min-height:80px}
.footer{font-size:.75rem;color:#94a3b8;text-align:center;padding:24px 0 32px;line-height:1.7}
@media(max-width:560px){.grid2{grid-template-columns:1fr}.future-grid{grid-template-columns:1fr}}
@media print{.share-bar,.capture,.aff-box,.journey-box,.ad-slot{display:none!important}
             .card{box-shadow:none}}
</style>
</head>

<script>

function exportPDF(){window.print()}
function shareReddit(txt){
  var t=encodeURIComponent(txt);
  var u=encodeURIComponent(window.location.href);
  window.open('https://www.reddit.com/submit?title='+t+'&url='+u,'_blank');
}
function shareTwitter(txt){
  var t=encodeURIComponent(txt+' '+window.location.href);
  window.open('https://twitter.com/intent/tweet?text='+t,'_blank');
}
function submitEmail(e,slug,result){
  e.preventDefault();
  var em=document.getElementById('cap_email').value;
  if(!em)return false;
  var fd=new FormData();
  fd.append('email',em);fd.append('source',slug);fd.append('result',result);
  fetch('https://formspree.io/f/xpwzpwzp',{
    method:'POST',body:fd,headers:{'Accept':'application/json'}
  }).then(function(){
    document.getElementById('cap_email').value='';
    var t=document.getElementById('cap_thanks');
    if(t)t.style.display='block';
  }).catch(function(){});
  return false;
}
function showAll(){
  var ids=['aff_box','journey_box','cap_box'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.style.display='block';
  });
}


var carYear=0, carTotal=0;
function getResult(){return carYear+'/yr';}
function run(){
  var price  =parseFloat(document.getElementById('price').value)||0;
  var monthly=parseFloat(document.getElementById('monthly').value)||0;
  var fuel   =parseFloat(document.getElementById('fuel').value)||0;
  var insurance=parseFloat(document.getElementById('insurance').value)||0;
  var parking=parseFloat(document.getElementById('parking').value)||0;
  var maint  =parseFloat(document.getElementById('maint').value)||0;
  var depr   =price*0.15;
  var yearCost=((monthly+fuel+insurance+parking+maint)*12)+depr;
  var mo=yearCost/12;
  carYear=Math.round(yearCost);
  carTotal=carYear;
  document.getElementById('r_monthly').textContent=mo.toFixed(0)+'€/mo';
  document.getElementById('r_annual').textContent=yearCost.toFixed(0)+'€/yr';
  document.getElementById('r_depr').textContent=depr.toFixed(0)+'€/yr';
  document.getElementById('r_total5').textContent=(yearCost*5).toFixed(0)+'€';
  var f3=yearCost*3, f5=yearCost*5, f10=yearCost*10;
  var inv3=f3*Math.pow(1.07,3), inv5=f5*Math.pow(1.07,5), inv10=f10*Math.pow(1.07,10);
  document.getElementById('fut3').textContent=f3.toFixed(0)+'€';
  document.getElementById('fut5').textContent=f5.toFixed(0)+'€';
  document.getElementById('fut10').textContent=f10.toFixed(0)+'€';
  document.getElementById('future_box').style.display='block';
  var shock=document.getElementById('car_shock');
  shock.style.display='block';
  if(mo>800){shock.className='shock shock-red';}
  else if(mo>500){shock.className='shock shock-orange';}
  else{shock.className='shock shock-green';}
  shock.innerHTML='<div class="shock-title">Your car costs you '+mo.toFixed(0)+
    '€ every single month</div><div class="shock-sub">That's '+yearCost.toFixed(0)+
    '€/year — invested at 7% over 10 years = '+inv10.toFixed(0)+'€ you could have</div>';
  document.getElementById('prescription').style.display='block';
  showAll();
}

window.onload=run;
</script>
