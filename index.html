<script>

function showProj(mo){
  if(!mo||mo<=0){document.getElementById('proj').style.display='none';return;}
  var rows=[3,5,10]; var html='';
  for(var i=0;i<rows.length;i++){
    var y=rows[i];
    var cost=Math.round(mo*12*y);
    var gain=Math.round(cost*Math.pow(1.07,y));
    var delta=Math.round(gain-cost);
    html+='<div class="proj-row">'
      +'<span class="proj-year">'+y+' ans</span>'
      +'<span class="proj-cost">-'+cost.toLocaleString()+'</span>'
      +'<span class="proj-gain">+'+gain.toLocaleString()+' si investi</span>'
      +'<span class="proj-note">(+'+delta.toLocaleString()+'  interets)</span>'
      +'</div>';
  }
  document.getElementById('proj-body').innerHTML=html;
  document.getElementById('proj').style.display='block';
}
